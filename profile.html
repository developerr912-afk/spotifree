<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Profile | Spotifree</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #121212; 
            color: white; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden; 
        }
        .spotify-btn { 
            background-color: transparent; 
            border: 1px solid #333; 
            transition: all 0.2s; 
            cursor: pointer; 
        }
        .spotify-btn:active { 
            transform: scale(0.95); 
            background-color: rgba(255,255,255,0.1); 
        }
        .back-btn { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 50; 
            cursor: pointer; 
        }
        
        .fade-in { 
            animation: fadeIn 0.6s ease-out; 
        }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* Settings modal slide animation */
        #settings-modal { 
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); 
            transform: translateY(100%); 
            z-index: 500; 
        }
        .show-settings { 
            transform: translateY(0) !important; 
        }
        
        .hidden { 
            display: none; 
        }
        .modal-bg { 
            background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(10px); 
        }

        /* ========= CUSTOM TOGGLE SWITCH (slide + green) ========= */
        .privacy-toggle {
            width: 48px;           /* w-12 */
            height: 24px;          /* h-6 */
            background-color: #27272a;  /* zinc-800 */
            border-radius: 9999px;
            padding: 4px;          /* p-1 */
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.2), 0 1px 2px rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
        }
        .toggle-knob {
            width: 16px;           /* w-4 */
            height: 16px;          /* h-4 */
            background-color: #ffffff;
            border-radius: 50%;
            transition: transform 0.22s cubic-bezier(0.2, 0.85, 0.4, 1);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            will-change: transform;
        }
        /* Active state: green background + knob slides right */
        .privacy-toggle.active {
            background-color: #22c55e;   /* fresh green-500 */
        }
        .privacy-toggle.active .toggle-knob {
            transform: translateX(24px);   /* 48px - 16px - 8px padding = 24px travel */
        }
        /* hover + active micro feedback */
        .privacy-toggle:hover {
            filter: brightness(1.02);
        }
        .privacy-toggle:active .toggle-knob {
            transform: scale(0.96);
        }
        .privacy-toggle.active:active .toggle-knob {
            transform: translateX(24px) scale(0.96);
        }
        /* accessibility focus ring */
        .privacy-toggle:focus-visible {
            outline: 2px solid #3b82f6;
            outline-offset: 2px;
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div onclick="window.history.back()" class="back-btn p-2 bg-black/40 rounded-full hover:bg-black/60 transition" aria-label="Go back">
        <svg width="24" height="24" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
    </div>

    <header class="pt-24 pb-12 flex flex-col items-center bg-gradient-to-b from-[#1DB954]/20 to-[#121212] px-6 text-center">
        <div id="profile-avatar" class="w-32 h-32 bg-[#D85C27] rounded-full flex items-center justify-center text-5xl font-black shadow-2xl mb-6 ring-4 ring-white/5 fade-in">
            ?
        </div>
        
        <h1 id="user-display-name" class="text-4xl font-black mb-4 tracking-tighter fade-in">Loading...</h1>
        
        <div class="flex gap-10 mb-8 fade-in">
           
        </div>

        <div class="flex items-center gap-3 w-full max-w-sm fade-in">
            <button onclick="window.openEditModal()" class="flex-1 spotify-btn py-3 rounded-full text-[11px] font-black uppercase tracking-widest border-white/10 hover:border-white/40">
                Edit Profile
            </button>
            <button onclick="window.openSettings()" class="flex-1 spotify-btn py-3 rounded-full text-[11px] font-black uppercase tracking-widest border-white/10 hover:border-white/40">
                Settings
            </button>
        </div>
    </header>

    <section class="px-6 mt-8 fade-in">
        <h2 class="text-xl font-black mb-6 tracking-tight">Public Playlists</h2>
        <div id="public-playlists-grid" class="grid grid-cols-2 gap-4">
            <div class="col-span-2 text-zinc-600 text-xs font-bold uppercase tracking-widest py-16 text-center bg-white/5 rounded-[2rem] border border-dashed border-white/10">
                No public playlists yet.
            </div>
        </div>
    </section>

    <!-- SETTINGS MODAL (with working toggle) -->
    <div id="settings-modal" class="fixed inset-0 bg-[#121212] p-6 flex flex-col overflow-y-auto">
        <div class="flex items-center gap-4 mb-10">
            <button onclick="window.closeSettings()" class="p-2 bg-white/5 rounded-full" aria-label="Close settings"><svg width="24" height="24" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg></button>
            <h2 class="text-2xl font-black">Settings</h2>
        </div>
        
        <div class="space-y-4">
            <!-- PRIVATE SESSION TOGGLE - fully interactive: slide + green background -->
            <div class="bg-white/5 p-5 rounded-2xl flex justify-between items-center">
                <div>
                    <h4 class="font-bold text-sm">Private Session</h4>
                    <p class="text-[10px] text-zinc-500 font-bold uppercase mt-1">Hide listening activity</p>
                </div>
                <!-- Custom toggle switch -->
                <div class="privacy-toggle" id="privateSessionToggle" role="switch" aria-checked="false" tabindex="0">
                    <div class="toggle-knob"></div>
                </div>
            </div>

            <!-- Spotifree subscription card -->
            <div onclick="window.location.href='soon.html'" class="bg-[#1DB954]/10 p-5 rounded-2xl flex justify-between items-center border border-[#1DB954]/20 cursor-pointer transition active:scale-[0.98]">
                <div><h4 class="font-bold text-sm text-[#1DB954]">Spotifree</h4><p class="text-[10px] text-[#1DB954]/60 font-bold uppercase mt-1">Manage Subscription</p></div>
                <svg class="text-[#1DB954]" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
            </div>
            
            <button onclick="window.handleLogout()" class="w-full bg-red-500/10 text-red-500 py-4 rounded-2xl text-xs font-black uppercase tracking-widest mt-10 hover:bg-red-500/20 transition">Log out</button>
        </div>
    </div>

    <!-- EDIT PROFILE MODAL -->
    <div id="edit-modal" class="fixed inset-0 z-[600] modal-bg hidden flex items-center justify-center p-6">
        <div class="bg-[#282828] w-full max-w-sm p-8 rounded-[2.5rem] shadow-2xl border border-white/10">
            <h2 class="text-2xl font-black mb-8 text-center tracking-tight">Edit Profile</h2>
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-black text-zinc-500 uppercase tracking-[0.2em] ml-2">Display Name</label>
                    <input type="text" id="edit-name-input" class="w-full bg-[#1a1a1a] p-5 rounded-2xl outline-none focus:ring-2 ring-[#1DB954] transition-all font-bold mt-2">
                </div>
                <!-- followers/following fields are hidden because they are managed backend? keeping original minimal edit -->
            </div>
            <div class="flex gap-4 mt-10">
                <button onclick="window.closeEditModal()" class="flex-1 py-4 font-black text-zinc-500 text-xs uppercase tracking-widest">Back</button>
                <button id="save-profile-btn" class="flex-1 bg-[#1DB954] text-black font-black py-4 rounded-full text-xs uppercase tracking-widest shadow-lg shadow-[#1DB954]/20">Save</button>
            </div>
        </div>
    </div>

    <!-- Firebase + Firestore logic (unchanged except adding toggle initialization) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAu9j3mz53BnTohcQTAOrOMOTFkFMeArYw",
            authDomain: "spotify-74d5c.firebaseapp.com",
            databaseURL: "https://spotify-74d5c-default-rtdb.firebaseio.com",
            projectId: "spotify-74d5c",
            storageBucket: "spotify-74d5c.firebasestorage.app",
            messagingSenderId: "686699469107",
            appId: "1:686699469107:web:cd00609b808f638d0f0646",
            measurementId: "G-3PGWZRDDB5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUserUID = null;

        // Auth Listener & Real-time Profile Load
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserUID = user.uid;
                const profileRef = doc(db, "user_profile", user.uid);
                
                onSnapshot(profileRef, (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.data();
                        const name = data.name || "User";
                        
                        // Update UI
                        document.getElementById('user-display-name').innerText = name;
                        document.getElementById('profile-avatar').innerText = name.charAt(0).toUpperCase();
                        const followersEl = document.getElementById('followers-count');
                        const followingEl = document.getElementById('following-count');
                        if (followersEl) followersEl.innerText = data.followers || 0;
                        if (followingEl) followingEl.innerText = data.following || 0;
                        
                        // Fill Edit Input
                        const editNameInput = document.getElementById('edit-name-input');
                        if (editNameInput) editNameInput.value = name;
                    } else {
                        // fallback: create minimal profile if needed? but display placeholder
                        document.getElementById('user-display-name').innerText = user.email?.split('@')[0] || "User";
                        document.getElementById('profile-avatar').innerText = (user.email?.charAt(0) || 'U').toUpperCase();
                    }
                }, (error) => {
                    console.warn("Snapshot error:", error);
                });
            } else {
                window.location.href = "addaccount.html";
            }
        });

        // Save Profile Function
        document.getElementById('save-profile-btn').onclick = async () => {
            const newName = document.getElementById('edit-name-input').value.trim();
            if (!newName) return alert("Display name cannot be empty!");
            if (!currentUserUID) return;

            try {
                const profileRef = doc(db, "user_profile", currentUserUID);
                await updateDoc(profileRef, {
                    name: newName
                });
                alert("Profile Updated!");
                window.closeEditModal();
            } catch (e) {
                alert("Error updating profile: " + e.message);
            }
        };

        // Logout
        window.handleLogout = () => {
            if(confirm("Are you sure you want to log out?")) {
                signOut(auth).then(() => window.location.href = "addaccount.html");
            }
        };
    </script>

    <!-- Vanilla JS for modal controls + TOGGLE functionality (slide & green) -->
    <script>
        // Modal open/close functions
        window.openSettings = () => {
            document.getElementById('settings-modal').classList.add('show-settings');
        };
        window.closeSettings = () => {
            document.getElementById('settings-modal').classList.remove('show-settings');
        };
        
        window.openEditModal = () => {
            document.getElementById('edit-modal').classList.remove('hidden');
        };
        window.closeEditModal = () => {
            document.getElementById('edit-modal').classList.add('hidden');
        };

        // ------------------- PRIVATE SESSION TOGGLE LOGIC -------------------
        // Ensure toggle works after DOM fully loaded (also if re-initialized)
        function initPrivateSessionToggle() {
            const toggleElement = document.getElementById('privateSessionToggle');
            if (!toggleElement) return;

            // function to update aria-checked based on active class
            function updateAria() {
                const isActive = toggleElement.classList.contains('active');
                toggleElement.setAttribute('aria-checked', isActive ? 'true' : 'false');
            }

            // toggle click handler: adds/removes 'active' class -> CSS handles green bg + slide
            function handleToggleClick(event) {
                event.stopPropagation();
                toggleElement.classList.toggle('active');
                updateAria();
                
                // Optional: you can hook any real private session logic here (e.g., console, localstorage)
                const isPrivate = toggleElement.classList.contains('active');
                // For demonstration, log state (can be extended for backend sync)
                console.log(`Private session mode: ${isPrivate ? 'ON (hidden activity)' : 'OFF'}`);
                // (optional) store in localStorage to persist across page reloads
                try {
                    localStorage.setItem('spotifree_private_session', isPrivate ? 'true' : 'false');
                } catch(e) {}
            }

            // attach click event
            toggleElement.addEventListener('click', handleToggleClick);
            
            // Keyboard accessibility: Enter / Space
            toggleElement.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    handleToggleClick(e);
                }
            });
            
            // Restore previous state from localStorage (optional but adds persistence)
            try {
                const savedState = localStorage.getItem('spotifree_private_session');
                if (savedState === 'true') {
                    toggleElement.classList.add('active');
                } else if (savedState === 'false') {
                    toggleElement.classList.remove('active');
                } else {
                    // default: inactive (no active class)
                    toggleElement.classList.remove('active');
                }
                updateAria();
            } catch(e) { /* localStorage not available, ignore */ }
        }

        // Initialize toggle when DOM ready (ensures element exists)
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initPrivateSessionToggle);
        } else {
            initPrivateSessionToggle();
        }
    </script>

    <!-- Additional micro-style to ensure smooth knob sliding even after modal re-open -->
    <style>
        /* guarantee the toggle knob has correct transition even if touched from hidden state */
        .privacy-toggle, .toggle-knob {
            transition: background-color 0.25s ease, transform 0.22s cubic-bezier(0.2, 0.85, 0.4, 1);
        }
        /* any accidental default background override */
        .privacy-toggle {
            background-color: #27272a;
        }
        .privacy-toggle.active {
            background-color: #22c55e;
        }
    </style>

    
<script type="module" src="profile.js"></script>

</body>
</html>
