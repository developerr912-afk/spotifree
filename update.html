<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What's New | Spotifree</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #121212; color: white; -webkit-tap-highlight-color: transparent; }
        .update-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.05); transition: transform 0.2s; }
        .back-btn { position: fixed; top: 20px; left: 20px; z-index: 100; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .glow-dot { width: 8px; height: 8px; background-color: #1DB954; border-radius: 50%; box-shadow: 0 0 10px #1DB954; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div onclick="window.history.back()" class="back-btn p-2 rounded-full cursor-pointer border border-white/10">
        <svg width="24" height="24" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
    </div>

    <header class="pt-24 pb-8 px-6 bg-gradient-to-b from-[#1DB954]/20 to-transparent">
        <h1 class="text-4xl font-black tracking-tighter">What's new</h1>
        <p class="text-zinc-400 text-sm font-medium mt-1">The latest updates and news from Spotifree.</p>
    </header>

    <main id="updates-container" class="px-6 space-y-4">
        <div class="animate-pulse space-y-4">
            <div class="h-24 bg-white/5 rounded-3xl"></div>
            <div class="h-24 bg-white/5 rounded-3xl"></div>
        </div>
    </main>

    <script type="module" src="update.js">
       
    </script>

</body>
</html>
